<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- header > sticky  -->
     <!-- Profile > center  -->
      <!-- notification badge  -->
       <!-- contact btn > fixed  -->


    <header class="sticky-header">
        <h1>My Profile</h1>
    </header>

    <section class="profile">
        <div class="badge">⭐</div>
        <img src="https://media.sproutsocial.com/uploads/2022/06/profile-picture.jpeg" alt="">
        <h2 class="name">Sardar Nazeer</h2>
        <p class="bio">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. 
            Dolorem error voluptate sint unde facilis repellat illo, omnis placeat cumque quia.
        </p>

        <div class="stats">
            <div class="stat">
                <h3>130</h3>
                <p>Projects</p>
            </div>
            <div class="stat">
                <h3>85+</h3>
                <p>Clients</p>
            </div>
            <div class="stat">
                <h3>10+</h3>
                <p>Awards</p>
            </div>
        </div>
    </section>

    <button class="contact-btn">📧 Contact Me</button>


</body>
</html>
