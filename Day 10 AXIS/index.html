<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>FlexBox: Main axis vs Cross Axis</h1>

    <div class="wrapper">
        <div class="demo">
            <div class="label">Main Axis = Row (default)</div>
            <div class="arrow">Main Axis Direction = left to right</div>
            <div class="arrow">Cross Axis = Top To Bottom</div>

            <div class="container"
            style="justify-content: center; align-items: center;">
                <div class="item">A</div>
                <div class="item">B</div>
                <div class="item">C</div>
            </div>

        </div>

    </div>

    <div class="demo">
        <div class="label">Main Axis = Coloumn (flex-direction: coulmn)</div>
        <div class="arrow">Main Axis Direction = Top To Bottom</div>
        <div class="arrow">Cross Axis = left to right</div>

        <div class="container"
        style="flex-direction: column; justify-content: center; align-items: center;">
            <div class="item">A</div>
            <div class="item">B</div>
            <div class="item">C</div>

        </div>
    </div>

</body>
</html>
