<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Properties</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h2>Display Block</h2>
    <div class="block">Box1 (Block)</div>
    <div class="block">Box2 (Block)</div>
    <p>Each blocks take the full line, so next move</p>

    <h2>Display Inline</h2>
    <div class="inline">Word1</div>
    <div class="inline">Word2</div>
    <div class="inline">Word3</div>
    <p>Inline boxes sit side by side</p>

    <h2>Display inline-block</h2>
    <div class="inline-block">Box A</div>
    <div class="inline-block">Box B</div>
    <div class="inline-block">Box C</div>
    <p>Inline-block boxes sit next to each other but keep width nad height like real boxes</p>

</body>
</html>
