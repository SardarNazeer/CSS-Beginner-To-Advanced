<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS BASICS</title>

    <!-- internal css  -->
     <!-- jis page me hunge usko style karega  -->

    <style>
        span{
            background-color: blueviolet;
            color: aliceblue;
        }
    </style>

    <!-- external css  -->
     <!-- apki css file alag hugi ap jis page p chaho apply kr skte ho  -->

    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- inline css  -->
     <!-- but ye tareeqa prefer nahi hai  -->

    <p style="color: brown; background-color: aquamarine;">Inline CSS</p>

    <span>Internal CSS</span>

    <h1>External CSS</h1>

    <!-- selector & properties  -->

    <h2>Element Selector</h2>

    <p class="para">class selector</p>

    <p id="newpara">Lorem ipsum, dolor sit amet consectetur adipisicing.</p>

</body>
</html>
